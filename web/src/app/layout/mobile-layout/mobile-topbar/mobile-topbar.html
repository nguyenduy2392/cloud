<header class="app-topbar">
  <div class="page-container topbar-menu">
    <div class="mobile-topbar__bar w-100">
      <div class="mobile-topbar__cell mobile-topbar__cell--start">
        @if (canGoBack) {
          <button
            type="button"
            class="btn btn-link text-secondary text-decoration-none mobile-topbar__back-link d-inline-flex align-items-center gap-0 px-1 py-2 border-0 shadow-none"
            (click)="goBack()"
            aria-label="Quay lại"
          >
            <i class="ti ti-chevron-left mobile-topbar__back-icon" aria-hidden="true"></i>
          </button>
        }
      </div>
      <div class="mobile-topbar__cell mobile-topbar__cell--title min-w-0 px-1">
        @if (pageTitle) {
          <span class="mobile-topbar__title mb-0 text-truncate">{{ pageTitle }}</span>
        }
      </div>
      <div class="mobile-topbar__cell mobile-topbar__cell--end">
        <div class="d-flex align-items-center gap-2 flex-shrink-0">
      <div class="topbar-item nav-user">
        <div class="dropdown" ngbDropdown>
          <a ngbDropdownToggle class="topbar-link drop-arrow-none px-2" data-bs-toggle="dropdown" data-bs-offset="0,19"
            type="button" aria-haspopup="false" aria-expanded="false">
            <img [src]="avatarSrc" width="32" class="rounded-circle me-lg-2 d-flex" alt="" />
            <span class="d-none d-sm-flex flex-column gap-1">
              <h5 class="my-0 fs-14">{{ displayName }}</h5>
              @if (displaySubtitle) {
              <h6 class="my-0 fw-normal text-truncate fs-12" style="max-width: 10rem">
                {{ displaySubtitle }}
              </h6>
              }
            </span>
            <i class="ti ti-chevron-down d-none d-sm-inline align-middle ms-1"></i>
          </a>
          <div ngbDropdownMenu class="dropdown-menu-end">
            <div class="dropdown-header noti-title">
              <h6 class="text-overflow m-0">Chào mừng{{ displayName ? ', ' + displayName : '' }}!</h6>
            </div>

            <a href="javascript:void(0);" ngbDropdownItem>
              <i class="ti ti-user-hexagon me-1 fs-17 align-middle"></i>
              <span class="align-middle">Tài khoản</span>
            </a>

            <!-- <a routerLink="/dashboards/wallet" ngbDropdownItem>
              <i class="ti ti-wallet me-1 fs-17 align-middle"></i>
              <span class="align-middle">Ví :
                <span class="fw-semibold">{{ currency }}985.25</span></span>
            </a>

            <a href="javascript:void(0);" ngbDropdownItem>
              <i class="ti ti-settings me-1 fs-17 align-middle"></i>
              <span class="align-middle">Cài đặt</span>
            </a> -->

            <a href="javascript:void(0);" ngbDropdownItem>
              <i class="ti ti-lifebuoy me-1 fs-17 align-middle"></i>
              <span class="align-middle">Hỗ trợ</span>
            </a>

            <div class="dropdown-divider"></div>

            <!-- <a href="/auth/lock-screen" ngbDropdownItem>
              <i class="ti ti-lock-square-rounded me-1 fs-17 align-middle"></i>
              <span class="align-middle">Khóa màn hình</span>
            </a> -->

            <a (click)="logout()" class="cursor-pointer dropdown-item active fw-semibold text-danger">
              <i class="ti ti-logout me-1 fs-17 align-middle"></i>
              <span class="align-middle">Đăng xuất</span>
            </a>
          </div>
        </div>
      </div>
        </div>
      </div>
    </div>
  </div>
</header>
