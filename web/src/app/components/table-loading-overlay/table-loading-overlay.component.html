<div
  class="table-loading-overlay"
  role="status"
  aria-live="polite"
  aria-busy="true"
>
  <div
    class="table-loading-inner d-flex flex-column align-items-center justify-content-center gap-3 py-5 px-3 text-center"
  >
    <div
      class="spinner-border"
      [ngClass]="'text-' + spinnerVariant"
      role="presentation"
    ></div>
    <div class="d-flex flex-column align-items-center gap-1">
      <span class="fw-semibold text-body">{{ title }}</span>
      @if (subtitle) {
        <span class="small text-muted">{{ subtitle }}</span>
      }
    </div>
  </div>
</div>
